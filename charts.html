<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTFS Aeronautical Chart Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <!-- TOP NAVBAR -->
    <nav class="bg-blue-950 px-6 py-4 flex justify-between items-center border-b border-blue-800 shadow-lg">
        <div class="flex items-center gap-3">
            <span class="text-2xl">✈️</span>
            <h1 class="text-xl font-bold tracking-wider text-blue-400">PTFS CHARTS REPOSITORY</h1>
        </div>
        <div>
            <button onclick="toggleOwnerPanel()" id="ownerNavBtn" class="bg-gray-800 hover:bg-gray-750 transition px-4 py-2 rounded text-sm font-medium flex items-center gap-2 border border-gray-700">
                <i class="fas fa-lock text-gray-400"></i> Owner Panel
            </button>
        </div>
    </nav>

    <!-- Halaman Utama Publik -->
    <div id="publicPage" class="max-w-7xl mx-auto mt-8 p-4 grid grid-cols-1 md:grid-cols-4 gap-6">
        
        <!-- Kolom Kiri: Input Cari ICAO -->
        <div class="md:col-span-1 space-y-4">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
                <label class="block text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Cari Bandara PTFS</label>
                <div class="relative">
                    <input type="text" id="searchIcao" placeholder="Contoh: IKFL, IRFD..." class="w-full pl-3 pr-10 py-2.5 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 uppercase font-mono tracking-widest text-lg text-white">
                    <button onclick="searchAirport()" class="absolute right-2 top-2.5 text-blue-400 hover:text-blue-300">
                        <i class="fas fa-search text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Detail Bandara Aktif -->
            <div id="airportInfoBox" class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md hidden">
                <h2 class="text-xl font-bold text-white mb-1" id="activeAirportTitle">Nama Bandara</h2>
                <p class="text-sm text-blue-400 font-mono" id="activeAirportIcao">ICAO: ----</p>
                <div class="mt-4 pt-3 border-t border-gray-700 text-xs text-gray-400 space-y-2">
                    <div><i class="fas fa-server mr-1"></i> Status: <span class="text-emerald-400 font-semibold">Active</span></div>
                </div>
            </div>
        </div>

        <!-- Kolom Kanan: Navigasi 5 Kategori Sektor & Daftar File -->
        <div id="chartDisplaySection" class="md:col-span-3 space-y-6 hidden">
            <!-- Tab Menu Navigasi Sektor -->
            <div class="bg-gray-800 p-2 rounded-xl border border-gray-700 flex flex-wrap gap-1 shadow-md">
                <button onclick="switchTab('enroute')" id="btn-enroute" class="tab-btn flex-1 py-2.5 px-3 rounded-lg font-medium text-xs sm:text-sm transition text-center bg-blue-600 text-white">Main Enroute</button>
                <button onclick="switchTab('sids')" id="btn-sids" class="tab-btn flex-1 py-2.5 px-3 rounded-lg font-medium text-xs sm:text-sm transition text-center text-gray-400 hover:bg-gray-700 hover:text-white">SIDs</button>
                <button onclick="switchTab('stars')" id="btn-stars" class="tab-btn flex-1 py-2.5 px-3 rounded-lg font-medium text-xs sm:text-sm transition text-center text-gray-400 hover:bg-gray-700 hover:text-white">STARs</button>
                <button onclick="switchTab('apploc')" id="btn-apploc" class="tab-btn flex-1 py-2.5 px-3 rounded-lg font-medium text-xs sm:text-sm transition text-center text-gray-400 hover:bg-gray-700 hover:text-white">APP/LOC</button>
                <button onclick="switchTab('ref')" id="btn-ref" class="tab-btn flex-1 py-2.5 px-3 rounded-lg font-medium text-xs sm:text-sm transition text-center text-gray-400 hover:bg-gray-700 hover:text-white">REF</button>
            </div>

            <!-- Box List Dokumen -->
            <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-md overflow-hidden">
                <div class="p-4 bg-gray-750 border-b border-gray-700 flex justify-between items-center">
                    <h3 class="font-bold text-gray-300 uppercase tracking-wider text-xs sm:text-sm flex items-center gap-2">
                        <i class="fas fa-folder-open text-blue-400"></i> Sektor: <span id="currentCategoryTitle" class="text-white">Main Enroute</span>
                    </h3>
                    <span class="text-xs bg-gray-700 text-gray-400 px-2 py-1 rounded font-mono" id="fileCount">0 Files</span>
                </div>
                <div class="divide-y divide-gray-700 font-medium" id="chartListContainer">
                    <!-- Data muncul di sini setelah diisi Owner -->
                </div>
            </div>
        </div>

        <!-- Tampilan default saat belum mencari apapun -->
        <div id="emptyState" class="md:col-span-3 bg-gray-800 rounded-xl border border-gray-700 p-12 text-center text-gray-500">
            <i class="fas fa-plane text-4xl mb-3 text-gray-600 block"></i>
            Silakan masukkan kode ICAO bandara di sebelah kiri untuk melihat daftar chart aktif.
        </div>
    </div>

    <!-- PANEL KHUSUS OWNER (MANAGE & UPLOAD) -->
    <div id="ownerPanel" class="max-w-4xl mx-auto mt-8 p-4 hidden">
        
        <!-- Login Form Box -->
        <div id="loginBox" class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
            <h2 class="text-xl font-bold mb-4 text-center text-blue-400"><i class="fas fa-user-shield mr-2"></i>Owner Authentication</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Owner Password</label>
                    <input type="password" id="ownerPasswordInput" placeholder="Masukkan password kuat Anda..." class="w-full p-2.5 bg-gray-700 border border-gray-600 rounded focus:outline-none focus:border-blue-500 text-white">
                </div>
                <button onclick="verifyOwnerLogin()" class="w-full bg-blue-600 hover:bg-blue-500 p-2.5 rounded font-bold transition">Masuk Panel</button>
            </div>
        </div>

        <!-- Dashboard Konten (Muncul jika berhasil login) -->
        <div id="ownerDashboard" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Form Tambah Dokumen Baru -->
            <div class="md:col-span-1 bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md h-fit">
                <h3 class="text-lg font-bold mb-4 text-emerald-400"><i class="fas fa-plus-circle mr-2"></i>Upload Chart Baru</h3>
                <form id="uploadForm" class="space-y-4" onsubmit="handleFormUpload(event)">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Kode ICAO Bandara</label>
                        <input type="text" id="formIcao" placeholder="Misal: IKFL" class="w-full p-2 bg-gray-700 border border-gray-600 rounded uppercase font-mono text-white" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Pilih Sektor Kategori</label>
                        <select id="formCategory" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white">
                            <option value="enroute">Main Enroute</option>
                            <option value="sids">SIDs</option>
                            <option value="stars">STARs</option>
                            <option value="apploc">APP/LOC</option>
                            <option value="ref">REF</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Nama / Kode Chart</label>
                        <input type="text" id="formChartName" placeholder="Misal: ILS OR LOC RWY 08" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Alur Runway (Optional)</label>
                        <input type="text" id="formRwy" placeholder="Misal: 08, 26, ALL" class="w-full p-2 bg-gray-700 border border-gray-600 rounded uppercase text-white" value="ALL">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">URL Link File Chart (PDF/Image Link)</label>
                        <input type="url" id="formFileUrl" placeholder="https://..." class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white text-sm" required>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 transition p-2.5 rounded font-bold mt-2 text-white">Publish Chart</button>
                </form>
            </div>

            <!-- List Manajemen Data (Bisa untuk Hapus) -->
            <div class="md:col-span-2 bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h3 class="text-lg font-bold text-gray-300"><i class="fas fa-tasks mr-2"></i>Semua Database Terunggah</h3>
                    <button onclick="clearAllData()" class="text-xs bg-red-900/50 text-red-400 hover:bg-red-800 border border-red-700 px-2 py-1 rounded">Hapus Semua Data</button>
                </div>
                <div class="max-h-[500px] overflow-y-auto space-y-2" id="adminDatabaseList">
                    <!-- Daftar manajemen file terisi otomatis -->
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIKA UTAMA JAVASCRIPT SYSTEM -->
    <script>
        // MASTER PASSWORD DARI JEMINI
        const OWNER_PASSWORD = "PTFS_capt#792!xR9_SecureRepo";

        // Ambil data yang tersimpan dari memory browser atau buat struktur kosong jika belum ada
        let ptfsStorage = JSON.parse(localStorage.getItem('ptfs_charts_db')) || {};
        let currentSearchedIcao = "";
        let currentTab = "enroute";
        let isOwnerLoggedIn = false;

        // --- SISTEM AUTENTIKASI OWNER ---
        function verifyOwnerLogin() {
            const inputPass = document.getElementById('ownerPasswordInput').value;
            if (inputPass === OWNER_PASSWORD) {
                isOwnerLoggedIn = true;
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('ownerDashboard').classList.remove('hidden');
                document.getElementById('ownerNavBtn').innerHTML = `<i class="fas fa-sign-out-alt text-red-400"></i> Logout Owner`;
                renderAdminList();
            } else {
                alert("Password Salah! Akses ditolak.");
            }
        }

        function toggleOwnerPanel() {
            const pub = document.getElementById('publicPage');
            const own = document.getElementById('ownerPanel');
            const btn = document.getElementById('ownerNavBtn');

            if(own.classList.contains('hidden')) {
                // Mau buka Owner Panel
                pub.classList.add('hidden');
                own.classList.remove('hidden');
                if(!isOwnerLoggedIn) {
                    document.getElementById('loginBox').classList.remove('hidden');
                    document.getElementById('ownerDashboard').classList.add('hidden');
                }
            } else {
                // Kembali ke halaman utama publik
                pub.classList.remove('hidden');
                own.classList.add('hidden');
                if(isOwnerLoggedIn) {
                    btn.innerHTML = `<i class="fas fa-user-shield text-emerald-400"></i> Owner Panel`;
                } else {
                    btn.innerHTML = `<i class="fas fa-lock text-gray-400"></i> Owner Panel`;
                }
                if(currentSearchedIcao) searchAirport(); // Refresh tampilan data publik
            }
        }

        // --- MANAJEMEN DATABASE OLEH OWNER ---
        function handleFormUpload(e) {
            e.preventDefault();
            const icao = document.getElementById('formIcao').value.toUpperCase().trim();
            const category = document.getElementById('formCategory').value;
            const name = document.getElementById('formChartName').value;
            const rwy = document.getElementById('formRwy').value.toUpperCase();
            const url = document.getElementById('formFileUrl').value;
            const id = "chart_" + Date.now(); // ID Unik

            if(!ptfsStorage[icao]) {
                ptfsStorage[icao] = { enroute: [], sids: [], stars: [], apploc: [], ref: [] };
            }

            ptfsStorage[icao][category].push({ id, name, rwy, url });
            saveToLocalStorage();
            
            // Reset form input data nama & link saja agar pengisian berikutnya cepat
            document.getElementById('formChartName').value = "";
            document.getElementById('formFileUrl').value = "";
            
            alert(`Sukses! Chart berhasil dipublish ke bandara ${icao}`);
            renderAdminList();
        }

        function deleteChart(icao, category, id) {
            if(confirm("Apakah Anda yakin ingin menghapus dokumen ini?")) {
                ptfsStorage[icao][category] = ptfsStorage[icao][category].filter(item => item.id !== id);
                
                // Bersihkan folder ICAO jika seluruh kategorinya kosong melompong
                const isEmpty = Object.values(ptfsStorage[icao]).every(arr => arr.length === 0);
                if(isEmpty) delete ptfsStorage[icao];

                saveToLocalStorage();
                renderAdminList();
            }
        }

        function clearAllData() {
            if(confirm("PERINGATAN! Ini akan menghapus seluruh data yang pernah Anda isi secara permanen. Lanjutkan?")) {
                ptfsStorage = {};
                saveToLocalStorage();
                renderAdminList();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('ptfs_charts_db', JSON.stringify(ptfsStorage));
        }

        // Tampilan list management di panel admin
        function renderAdminList() {
            const container = document.getElementById('adminDatabaseList');
            container.innerHTML = "";
            
            const icaos = Object.keys(ptfsStorage);
            if(icaos.length === 0) {
                container.innerHTML = `<p class="text-sm text-gray-500 text-center py-8">Belum ada data chart yang dimasukkan ke sistem.</p>`;
                return;
            }

            icaos.forEach(icao => {
                const categories = ['enroute', 'sids', 'stars', 'apploc', 'ref'];
                categories.forEach(cat => {
                    ptfsStorage[icao][cat].forEach(file => {
                        container.innerHTML += `
                            <div class="p-3 bg-gray-700/50 rounded border border-gray-600 flex justify-between items-center text-xs">
                                <div>
                                    <span class="font-mono bg-blue-900 text-blue-300 px-1.5 py-0.5 rounded font-bold mr-2">${icao}</span>
                                    <span class="font-semibold text-gray-400 uppercase mr-2">[${cat}]</span>
                                    <span class="text-gray-200">${file.name} (Rwy: ${file.rwy})</span>
                                </div>
                                <button onclick="deleteChart('${icao}', '${cat}', '${file.id}')" class="text-red-400 hover:text-red-300 px-2 py-1"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        `;
                    });
                });
            });
        }


        // --- SISTEM PENCARIAN PUBLIK (VISITOR) ---
        function searchAirport() {
            const input = document.getElementById('searchIcao').value.toUpperCase().trim();
            if(!input) return alert("Harap isi kode ICAO terlebih dahulu!");

            currentSearchedIcao = input;

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('airportInfoBox').classList.remove('hidden');
            document.getElementById('chartDisplaySection').classList.remove('hidden');

            document.getElementById('activeAirportTitle').innerText = `PTFS Airport Repository`;
            document.getElementById('activeAirportIcao').innerText = `ICAO: ${input}`;

            switchTab(currentTab);
        }

        function switchTab(categoryKey) {
            currentTab = categoryKey;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-400', 'hover:bg-gray-700', 'hover:text-white');
            });
            document.getElementById(`btn-${categoryKey}`).classList.remove('text-gray-400', 'hover:bg-gray-700');
            document.getElementById(`btn-${categoryKey}`).classList.add('bg-blue-600', 'text-white');

            const formatTitles = { enroute: "Main Enroute", sids: "SIDs", stars: "STARs", apploc: "APP/LOC", ref: "REF" };
            document.getElementById('currentCategoryTitle').innerText = formatTitles[categoryKey];

            const container = document.getElementById('chartListContainer');
            container.innerHTML = "";

            // Ambil data dari penyimpanan lokal jika bandara & kategori tersebut memiliki file
            const files = (ptfsStorage[currentSearchedIcao] && ptfsStorage[currentSearchedIcao][categoryKey]) ? ptfsStorage[currentSearchedIcao][categoryKey] : [];
            document.getElementById('fileCount').innerText = `${files.length} Files`;

            if(files.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-gray-500 text-sm"><i class="fas fa-folder-open block text-xl mb-2 text-gray-600"></i> Kosong. Owner belum mengunggah chart untuk bandara ini di sektor ${formatTitles[categoryKey]}.</div>`;
                return;
            }

            files.forEach(file => {
                container.innerHTML += `
                    <div class="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center hover:bg-gray-750 transition gap-3">
                        <div>
                            <span class="text-xs bg-gray-700 text-blue-300 font-mono px-2 py-0.5 rounded border border-gray-600 mr-2">PDF</span>
                            <span class="text-sm font-semibold text-gray-200">${file.name}</span>
                        </div>
                        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
                            <span class="text-xs text-gray-400"><i class="fas fa-layer-group mr-1"></i> Rwy: <b class="text-gray-300">${file.rwy}</b></span>
                            <a href="${file.url}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1.5 rounded flex items-center gap-1 transition">
                                <i class="fas fa-external-link-alt"></i> Open Chart
                            </a>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
