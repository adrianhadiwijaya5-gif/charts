<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PTFS Repository Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
    </style>
</head>
<body class="bg-[#050a14] text-white min-h-screen p-6 font-sans">

    <header class="glass-card p-6 flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black">PTFS <span class="text-blue-500">REPOSITORY</span></h1>
        <button onclick="toggleAdmin()" id="adminBtn" class="bg-blue-600 px-6 py-2 rounded-full font-bold">Admin (Edit Mode)</button>
    </header>

    <div class="grid grid-cols-12 gap-6 h-[70vh]">
        <div class="col-span-3 glass-card p-4 overflow-y-auto" id="airportList"></div>
        <div class="col-span-9 glass-card p-10" id="displayArea">
            <h2 class="text-3xl font-black mb-6" id="airportTitle">Pilih Bandara</h2>
            <div class="grid grid-cols-4 gap-4" id="categoryGrid"></div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-10">
        <div class="glass-card p-8 w-96">
            <h2 class="text-xl font-bold mb-4">Edit/Tambah Chart</h2>
            <input type="text" id="chartUrl" placeholder="Masukkan URL PDF" class="w-full bg-slate-950 p-3 rounded mb-2 border border-slate-700">
            <button onclick="saveChart()" class="w-full bg-blue-600 py-2 rounded font-bold">Simpan</button>
            <button onclick="document.getElementById('editModal').classList.add('hidden')" class="w-full mt-2 text-slate-400">Batal</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ptfs_db')) || {};
        let currentAirport = "";
        let currentCat = "";
        const airports = ["IRFD", "IMLR", "IBLT", "ITRC", "IGAR", "ILAR", "IPAP", "IIAB", "IHEN", "IBAR", "IZOL", "ISCM", "IJAF", "IPPH", "ILKL", "ITKO", "IDCS", "IBRD", "IKFL", "ITEY", "ISAU", "IBTH", "ISKP"];
        
        function render() {
            const listEl = document.getElementById('airportList');
            listEl.innerHTML = "";
            airports.forEach(icao => {
                const div = document.createElement('div');
                div.className = "p-4 mb-2 bg-white/5 rounded-2xl cursor-pointer hover:bg-blue-600/20";
                div.innerHTML = `<span class="font-bold">${icao}</span>`;
                div.onclick = () => { currentAirport = icao; renderGrid(); };
                listEl.appendChild(div);
            });
        }

        function renderGrid() {
            document.getElementById('airportTitle').innerText = "Bandara " + currentAirport;
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = "";
            ["APP", "SID", "STAR", "GROUND", "ENROUTE", "REF"].forEach(cat => {
                const hasData = db[currentAirport]?.[cat];
                grid.innerHTML += `
                    <div class="p-6 bg-slate-900/50 rounded-3xl border border-slate-700 hover:border-blue-500 cursor-pointer text-center" 
                         onclick="openEdit('${cat}')">
                        <p class="font-bold">${cat}</p>
                        <p class="text-[10px] uppercase">${hasData ? 'Tersedia (Klik Edit)' : 'Tak Tersedia'}</p>
                    </div>
                `;
            });
        }

        function openEdit(cat) {
            currentCat = cat;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function saveChart() {
            const url = document.getElementById('chartUrl').value;
            if(!db[currentAirport]) db[currentAirport] = {};
            db[currentAirport][currentCat] = url;
            localStorage.setItem('ptfs_db', JSON.stringify(db));
            document.getElementById('editModal').classList.add('hidden');
            renderGrid();
        }

        function toggleAdmin() {
            const p = prompt("Masukkan Password:");
            if(p === "SHAFF77") alert("Mode Edit Aktif!");
            else alert("Password Salah!");
        }

        render();
    </script>
</body>
</html>
